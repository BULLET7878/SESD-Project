name: BlueMart CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run Linter
        run: npm run lint
        working-directory: client

      - name: Run Tests
        run: npm run test
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          VITE_BACKEND_URL: http://localhost:5000
          VITE_CURRENCY: $

  build-server:
    name: Build Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev
        working-directory: server

      - name: Run Test Suite
        run: npm test
        working-directory: server

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-client, build-server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build client image
        run: |
          docker build \
          --build-arg VITE_BACKEND_URL=http://localhost/api \
          --build-arg VITE_CURRENCY=\$ \
          -t bluemart-client ./client

      - name: Build server image
        run: |
          docker build \
          -t bluemart-server ./server

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/BlueMart
            git pull origin main
            docker compose down
            docker compose up --build -d