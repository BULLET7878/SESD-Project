services:
  mongo:
    image: mongo:7
    container_name: bluemart-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - bluemart-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: bluemart-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - FRONTEND_URL=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bluemart-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      args:
        - VITE_BACKEND_URL=http://localhost/api
        - VITE_CURRENCY=$
    container_name: bluemart-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - bluemart-net

volumes:
  mongo_data:

networks:
  bluemart-net:
    driver: bridge
